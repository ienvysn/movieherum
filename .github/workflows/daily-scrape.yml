name: Daily Cinema Scraper

on:
  schedule:
    - cron: "15 19 * * *"
  workflow_dispatch:

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Build + Start Next.js (Background)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          npm run build
          nohup npm run start > server.log 2>&1 &
          npx wait-on --timeout 120000 http-get://127.0.0.1:3000 || (echo "Next.js server failed to start (last 200 lines):" && tail -n 200 server.log && exit 1)

      - name: Run QFX Playwright Scraper
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: node scripts/scrape-qfx.mjs

      - name: Run All Scrapers
        run: |
          set -euo pipefail
          echo "Cleaning up expired showtimes..."
          curl -fsS --retry 3 --retry-all-errors -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" http://127.0.0.1:3000/api/scrape/cleanup

          echo "Starting QFX API Scraper (Fast Check)..."
          curl -fsS --retry 3 --retry-all-errors -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" http://127.0.0.1:3000/api/scrape/qfx

          echo "Starting BigMovies Scraper..."
          curl -fsS --retry 3 --retry-all-errors -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" http://127.0.0.1:3000/api/scrape/bigmovies

          echo "Starting Ranjana Scraper..."
          curl -fsS --retry 3 --retry-all-errors -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" http://127.0.0.1:3000/api/scrape/ranjana

          echo "Starting Infinity Scraper..."
          curl -fsS --retry 3 --retry-all-errors -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" http://127.0.0.1:3000/api/scrape/infinity

          echo "Starting CK Scraper..."
          curl -fsS --retry 3 --retry-all-errors -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" http://127.0.0.1:3000/api/scrape/ck

          echo "Starting One Scraper..."
          curl -fsS --retry 3 --retry-all-errors -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" http://127.0.0.1:3000/api/scrape/one

          echo "Starting Ini Scraper..."
          curl -fsS --retry 3 --retry-all-errors -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" http://127.0.0.1:3000/api/scrape/ini

          echo "Starting Fcube Scraper..."
          curl -fsS --retry 3 --retry-all-errors -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" http://127.0.0.1:3000/api/scrape/fcube

          echo "All scraping tasks have completed successfully!"

      - name: Display Server Logs on Failure
        if: failure()
        run: |
          echo "Next.js server logs (server.log):"
          if [ -f server.log ]; then
            cat server.log
          else
            echo "server.log not found."
          fi
